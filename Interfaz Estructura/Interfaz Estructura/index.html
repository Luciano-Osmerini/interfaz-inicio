			<script>
document.getElementById('btn-enviar').onclick = habilitarBotones;
document.getElementById('ip-hostname').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        habilitarBotones();
    }
});

function habilitarBotones() {
    const ip = document.getElementById('ip-hostname').value.trim();
    const botones = [
        'btn-ping', 'btn-tracert',
        'btn-avaya', 'btn-perfiles', 'btn-lentitud',
        'btn-mapa', 'btn-proxy', 'btn-dns', 'btn-cache',
        'btn-instructivo', 'btn-permisos', 'btn-accesos',
        'btn-simplex', 'btn-resolucion', 'btn-logger', 'btn-reiniciar'
    ];
    botones.forEach(id => {
        document.getElementById(id).disabled = !ip;
    });
}

function safeDniValue() {
    const dniInput = document.getElementById('dni');
    return dniInput ? dniInput.value.trim() : '';
}

function getApiUrl() {
    return document.getElementById('api-url').value.trim().replace(/\/$/, '');
}

function setToolOutput(text) {
    const out = document.getElementById('tool-output');
    if (out) out.textContent = text;
}

async function ejecutarHerramienta(endpoint, payload) {
    const apiUrl = getApiUrl();
    const response = await fetch(`${apiUrl}${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(payload),
    });

    const data = await response.json();
    if (!response.ok || data.error) {
        throw new Error(data.error || 'No se pudo ejecutar la herramienta');
    }
    return data;
}

document.getElementById('btn-ping').addEventListener('click', async function() {
    const target = document.getElementById('ip-hostname').value.trim();
    if (!target) {
        setToolOutput('Ingresa una IP o hostname antes de ejecutar ping.');
        return;
    }

    setToolOutput(`Ejecutando ping a ${target}...`);
    try {
        const data = await ejecutarHerramienta('/tools/ping', { target, count: 4 });
        setToolOutput(data.output || 'Sin salida de ping');
        registrarGestion(safeDniValue(), `Ping a ${target}`);
    } catch (err) {
        setToolOutput(`Error: ${err.message}`);
    }
});

document.getElementById('btn-tracert').addEventListener('click', async function() {
    const target = document.getElementById('ip-hostname').value.trim();
    if (!target) {
        setToolOutput('Ingresa una IP o hostname antes de ejecutar tracert.');
        return;
    }

    setToolOutput(`Ejecutando tracert a ${target}...`);
    try {
        const data = await ejecutarHerramienta('/tools/tracert', { target, max_hops: 15 });
        setToolOutput(data.output || 'Sin salida de tracert');
        registrarGestion(safeDniValue(), `Tracert a ${target}`);
    } catch (err) {
        setToolOutput(`Error: ${err.message}`);
    }
});

async function registrarGestion(dni, accion) {
    try {
        const apiUrl = getApiUrl();
        await fetch(`${apiUrl}/log_gestion`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ dni, accion })
        });
    } catch (e) {
        console.error("No se pudo registrar la gestión:", e);
    }
}

// Asegúrate de tener un campo para el DNI, por ejemplo:
// <input type="text" id="dni" placeholder="Ingrese su DNI" />

document.getElementById('btn-reiniciar').addEventListener('click', function() {
    const dni = safeDniValue();

// Nuevos botones
document.getElementById('btn-cache').addEventListener('click', function() {
    const dni = safeDniValue();
    registrarGestion(dni, 'Borrar Cache de Navegador');
});

document.getElementById('btn-instructivo').addEventListener('click', function() {
    const dni = safeDniValue();
    registrarGestion(dni, 'Instructivo VDI/Bluespace');
});

document.getElementById('btn-permisos').addEventListener('click', function() {
    const dni = safeDniValue();
    registrarGestion(dni, 'Actualización de Permisos');
});

document.getElementById('btn-accesos').addEventListener('click', function() {
    const dni = safeDniValue();
    registrarGestion(dni, 'Accesos Útiles');
});

document.getElementById('btn-simplex').addEventListener('click', function() {
    const dni = safeDniValue();
    registrarGestion(dni, 'Acceso Simplex');
    window.open('http://172.20.224.149/Simplex/', '_blank');
});

document.getElementById('btn-resolucion').addEventListener('click', async function() {
    const ancho = window.prompt('Nuevo ancho de pantalla (ej: 1920):');
    const alto = window.prompt('Nuevo alto de pantalla (ej: 1080):');
    if (!ancho || !alto) return;

    setToolOutput(`Cambiando resolucion a ${ancho}x${alto}...`);
    try {
        const data = await ejecutarHerramienta('/tools/resolution', {
            width: Number(ancho),
            height: Number(alto),
        });
        setToolOutput(data.message || 'Resolucion actualizada');
        registrarGestion(safeDniValue(), `Cambio resolucion ${ancho}x${alto}`);
    } catch (err) {
        setToolOutput(`Error: ${err.message}`);
    }
});

document.getElementById('btn-logger').addEventListener('click', function() {
    const dni = safeDniValue();
    registrarGestion(dni, 'Repara Logger');
});
</script>

<script>
const respuestas = {
    "recibo": "Para descargar tu recibo, haz clic en 'Descargar Mi Recibo'.",
    "vacaciones": "Para ver tus vacaciones, haz clic en 'Ver Mis Vacaciones'.",
    "mfa": "Para configurar MFA, haz clic en 'Configurar MFA' o revisa el instructivo.",
    "pc libres": "Para ver las PC libres, haz clic en 'PC Libres'.",
    "rrhh": "RRHH presencial atiende de Lunes a Jueves de 9 a 16.",
    "soporte": "Para soporte llama al 0800-222-8368.",
    "clima": "Pronto estará disponible la encuesta de clima laboral."
};

function responderChat(mensaje) {
    mensaje = mensaje.toLowerCase();
    for (const clave in respuestas) {
        if (mensaje.includes(clave)) {
            return respuestas[clave];
        }
    }
    return "No entiendo tu consulta. ¿Podés reformularla o elegir una opción del menú?";
}

document.getElementById('chat-send').onclick = function() {
    const input = document.getElementById('chat-input');
    const mensaje = input.value.trim();
    if (!mensaje) return;
    const chat = document.getElementById('chat-messages');
    chat.innerHTML += `<div style="text-align:right;"><b>Tú:</b> ${mensaje}</div>`;
    const respuesta = responderChat(mensaje);
    chat.innerHTML += `<div style="text-align:left;"><b>Bot:</b> ${respuesta}</div>`;
    chat.scrollTop = chat.scrollHeight;
    input.value = "";
};

document.getElementById('chat-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('chat-send').click();
});

function cerrarSesion() {
    window.location.href = '../Interfaz Inicio/index.html';
}
</script>
